<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>POS — Ultimate Bookkeeping</title>
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
  <!-- Safari bfcache fix -->
  <script>
    window.addEventListener('pageshow', function(e) {
      if (e && e.persisted) { try { window.location.reload(); } catch(_){} }
    }, false);
  </script>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Open+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <!-- POS Design -->
  <link rel="stylesheet" href="css/pos-redesign.css">
</head>
<body>

  <!-- ── Topbar ── -->
  <header class="pos-topbar">
    <button id="back-to-main" class="pos-topbar__back" onclick="navigateBackToMain()">
      <i class="fas fa-arrow-left"></i>
      <span>Back</span>
    </button>

    <div class="pos-topbar__brand">
      <i class="fas fa-cash-register"></i>
      <span>Point of Sale</span>
    </div>

    <div class="pos-topbar__divider"></div>

    <div class="pos-topbar__status">
      <span id="user-email">POS Mode</span>
    </div>

    <div class="pos-topbar__actions">
      <button id="dark-mode-toggle">
        <i class="fas fa-moon"></i>
        <span>Dark</span>
      </button>
    </div>
  </header>

  <!-- ── Main Layout ── -->
  <div class="pos-layout">

    <!-- LEFT: Products Panel -->
    <div class="pos-products-panel">

      <!-- Search + Scan row -->
      <div class="pos-search-row">
        <div class="pos-search-wrap">
          <i class="fas fa-search"></i>
          <input type="text" id="product-search" placeholder="Search products…" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <input type="text" id="barcode-scan" class="barcode-input" placeholder="Scan barcode…" autocomplete="off">
        <button id="open-scanner-btn">
          <i class="fas fa-qrcode"></i>
          <span>Scan</span>
        </button>
      </div>

      <!-- Category chips (populated by JS) -->
      <div class="pos-categories" id="pos-categories">
        <button class="pos-category-chip active" data-category="">All</button>
      </div>

      <!-- Product grid -->
      <div id="product-list"></div>

    </div><!-- /products panel -->

    <!-- RIGHT: Cart Panel -->
    <div class="pos-cart-panel">

      <!-- Customer name -->
      <div class="pos-customer-strip">
        <label for="customer-name-input"><i class="fas fa-user"></i> Customer</label>
        <input type="text" id="customer-name-input" class="pos-customer-input" placeholder="Walk-in Customer" autocomplete="off">
      </div>

      <!-- Cart items -->
      <div class="pos-cart-items" id="cart">
        <div class="pos-cart-empty">
          <i class="fas fa-shopping-basket"></i>
          <p>Cart is empty</p>
          <small>Tap a product to add it</small>
        </div>
      </div>

      <!-- Totals -->
      <div class="pos-cart-summary">
        <div class="summary-line">
          <span>Subtotal</span>
          <span id="summary-subtotal">₵0.00</span>
        </div>
        <div class="summary-line">
          <span>Discount</span>
          <span id="summary-discount">−₵0.00</span>
        </div>
        <div class="summary-line grand-total">
          <span>Total</span>
          <span id="summary-total">₵0.00</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="pos-cart-actions">
        <button class="btn-pos-danger" id="clear-cart">
          <i class="fas fa-trash-alt"></i> Clear
        </button>
        <button class="btn-pos-secondary" id="view-inventory">
          <i class="fas fa-boxes"></i> Stock
        </button>
        <button class="btn-checkout-main" id="checkout" disabled>
          <i class="fas fa-lock"></i>
          Checkout
        </button>
      </div>

    </div><!-- /cart panel -->

  </div><!-- /pos-layout -->

  <!-- ── Checkout Modal ── -->
  <div id="checkout-modal" class="modal">
    <div class="modal-content">
      <h2><i class="fas fa-receipt"></i> Checkout</h2>

      <div class="checkout-customer-field">
        <label for="customer-name">Customer Name</label>
        <input type="text" id="customer-name" placeholder="Walk-in Customer" autocomplete="off">
      </div>

      <p style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--pos-muted);margin-bottom:0.5rem;">Invoice Preview</p>
      <div class="invoice-scroll-container">
        <pre class="invoice" id="invoice-preview">Loading…</pre>
      </div>

      <div class="checkout-actions">
        <button class="btn-pos-cancel" id="cancel-checkout">
          <i class="fas fa-times"></i> Cancel
        </button>
        <button class="btn-pos-confirm" id="confirm-sale">
          <i class="fas fa-check"></i> Confirm Sale
        </button>
      </div>
    </div>
  </div>

  <!-- ── Inventory Modal ── -->
  <div id="inventory-modal" class="modal">
    <div class="modal-content" style="max-width:600px;">
      <h2><i class="fas fa-warehouse"></i> Stock Levels</h2>
      <div style="overflow-x:auto;">
        <table class="pos-inv-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Price</th>
              <th>Stock</th>
            </tr>
          </thead>
          <tbody id="inventory-list"></tbody>
        </table>
      </div>
      <button class="btn-pos-cancel" id="close-inventory" style="margin-top:0.5rem;">
        <i class="fas fa-times"></i> Close
      </button>
    </div>
  </div>

  <!-- ── Quantity Modal ── -->
  <div id="quantity-modal" class="modal">
    <div class="modal-content" style="max-width:380px;">
      <h3><i class="fas fa-box"></i> Add to Cart</h3>
      <p id="product-name-display"></p>

      <input type="number" id="quantity-input" min="1" value="1" autofocus>

      <label id="discount-checkbox-container" style="display:none;">
        <input type="checkbox" id="apply-discount-checkbox" checked>
        <span id="discount-label-text"></span>
      </label>

      <div class="qty-modal-actions">
        <button id="cancel-quantity" class="btn-pos-cancel">
          <i class="fas fa-times"></i> Cancel
        </button>
        <button id="add-quantity" class="btn-pos-confirm">
          <i class="fas fa-plus"></i> Add to Cart
        </button>
      </div>
    </div>
  </div>

  <!-- ── Scanner ── -->
  <div id="scanner-container">
    <div id="scanner-viewport"></div>
    <button id="close-scanner">
      <i class="fas fa-times"></i> Close Scanner
    </button>
  </div>

  <!-- ── Toast ── -->
  <div id="notification" class="notification">Added!</div>

  <!-- ── Scripts ── -->
  <script type="module">
    import { auth } from './js/config/firebase.js';
    import { onAuthStateChanged } from './js/config/firebase.js';
    import { POSMain }     from './js/pos/pos-main.js';
    import { POSUI }       from './js/pos/pos-ui.js';
    import { POSCart }     from './js/pos/pos-cart.js';
    import { POSProducts } from './js/pos/pos-products.js';
    import { POSCheckout } from './js/pos/pos-checkout.js';
    import { POSScanner }  from './js/pos/pos-scanner.js';
    import { POSModal }    from './js/pos/pos-modal.js';
    import { POSData }     from './js/pos/pos-data.js';
    import { POSInvoice }  from './js/pos/pos-invoice.js';

    window.POSMain     = POSMain;
    window.POSUI       = POSUI;
    window.POSCart     = POSCart;
    window.POSProducts = POSProducts;
    window.POSCheckout = POSCheckout;
    window.POSScanner  = POSScanner;
    window.POSModal    = POSModal;
    window.POSData     = POSData;
    window.POSInvoice  = POSInvoice;

    window.addEventListener('load', async () => {
      try { await POSMain.init(); } catch(e) { console.error('POS init failed:', e); }
    });

    function navigateBackToMain() {
      const target = new URL('index.html', window.location.href).href;
      if (window.Capacitor && typeof window.Capacitor.isNativePlatform === 'function' && window.Capacitor.isNativePlatform()) {
        window.location.href = (window.Capacitor.convertFileSrc && window.Capacitor.convertFileSrc(target)) || target;
      } else {
        window.location.href = target;
      }
    }
    window.navigateBackToMain = navigateBackToMain;

    window.addEventListener('popstate', navigateBackToMain);
  </script>

</body>
</html>
